name: Accessibility Full Audit

on:
  workflow_dispatch:
    inputs:
      max-files:
        description: "Max files to scan in code audit (0 = unlimited)"
        required: false
        default: "100"
      batch-size:
        description: "Files per LLM request"
        required: false
        default: "10"

jobs:
  full-code-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          npm init -y
          npm install ollama glob

      - name: Write system prompt file
        run: |
          cat << 'PROMPT_EOF' > system-prompt.txt
          You are a WCAG 2.2 AA accessibility expert auditing source code files.

          Analyze each file for accessibility violations. Unlike a PR review, these are COMPLETE files — check every element.

          ## Severity Classification
          - CRITICAL: Blocks access entirely (missing alt, keyboard trap, no form label)
          - SERIOUS: Significant barrier (low contrast, missing focus indicator, generic link text)
          - MODERATE: Causes confusion (skipped headings, placeholder-only labels)
          - MINOR: Enhancement beyond WCAG minimum

          ## What to Check Per File
          - All <img> elements: missing or empty alt text
          - All <input> elements: associated <label> or aria-label
          - All <button> elements: accessible name
          - All <a> elements: descriptive link text
          - All onClick handlers on non-interactive elements: keyboard support
          - Heading structure: logical hierarchy (h1 > h2, no skips)
          - ARIA roles and attributes: correct usage
          - Focus management: tabIndex misuse
          - Color contrast: inline styles with explicit color values
          - Form elements: error identification, required field marking

          ## WCAG Criteria to Cover
          1.1.1, 1.3.1, 1.4.3, 1.4.11, 2.1.1, 2.1.2, 2.4.3, 2.4.4, 2.4.6, 2.4.7, 2.5.8, 3.3.1, 3.3.2, 4.1.1, 4.1.2

          ## Output Format
          Return ONLY valid JSON — no markdown, no preamble:
          {
            "issues": [
              {
                "file": "path/to/file.tsx",
                "line": 42,
                "wcag_criterion": "1.1.1",
                "wcag_level": "A",
                "severity": "CRITICAL",
                "confidence": "high",
                "title": "Image missing alternative text",
                "description": "The img element has no alt attribute.",
                "impact": "Screen reader users will not know what the image conveys.",
                "suggestion": "<img src='chart.png' alt='Bar chart showing Q3 sales' />"
              }
            ],
            "summary": "X issues found across Y files."
          }
          PROMPT_EOF

      - name: Run full codebase scan
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          MAX_FILES: ${{ github.event.inputs.max-files || '100' }}
          BATCH_SIZE: ${{ github.event.inputs.batch-size || '10' }}
        run: |
          cat << 'EOF' > full-scan.mjs
          import { Ollama } from "ollama";
          import { glob } from "glob";
          import fs from "fs";
          import path from "path";

          const API_KEY    = process.env.OLLAMA_API_KEY;
          const MAX_FILES  = parseInt(process.env.MAX_FILES  || "100");
          const BATCH_SIZE = parseInt(process.env.BATCH_SIZE || "10");

          if (!API_KEY) {
            console.error("❌ OLLAMA_API_KEY secret is not set.");
            process.exit(1);
          }

          const MARKUP_EXTENSIONS = new Set([
            "html","htm","xhtml","jsx","tsx","vue","svelte","astro",
            "erb","ejs","hbs","php","twig","liquid",
            "css","scss","sass","less","md","mdx"
          ]);

          const AMBIGUOUS_EXTENSIONS = new Set([
            "js","ts","mjs","cjs","py","rb","java"
          ]);

          const SKIP_PATTERNS = [
            /node_modules\//,
            /\.min\.(js|css)$/,
            /\.d\.ts$/,
            /package(-lock)?\.json$/,
            /yarn\.lock$/,
            /\.snap$/,
            /__snapshots__\//,
            /__tests__\//,
            /\.test\.(js|ts|jsx|tsx|py|rb)$/,
            /\.spec\.(js|ts|jsx|tsx|py|rb)$/,
            /\.env(\.|$)/,
            /tsconfig/,
            /\.config\.(js|ts|json|mjs|cjs)$/,
            /\.generated\./,
            /__generated__\//,
            /dist\//,
            /build\//,
            /migrations?\//,
            /api\//,
            /server\//,
            /backend\//,
          ];

          const MARKUP_CONTENT_PATTERNS = [
            /<[A-Z][a-zA-Z]*[\s>]/,
            /<[a-z][a-z0-9]*[\s>\/>]/i,
            /className\s*[=:>\{]/i,
            /style\s*=\s*[{"]/i,
            /ReactDOM/i,
            /createRoot\s*\(/i,
            /\{\%\s*.+?\s*\%\}/,
            /\{\{.+?\}\}/,
            /<\?.*?\?>/,
            /v-if|v-for|v-bind/i,
            /ng-if|ng-for|ng-bind/i,
          ];

          function getExtension(filename) {
            return filename.split(".").pop().toLowerCase();
          }

          function shouldSkip(filepath) {
            return SKIP_PATTERNS.some(p => p.test(filepath));
          }

          function containsMarkup(content) {
            return MARKUP_CONTENT_PATTERNS.some(p => p.test(content));
          }

          function shouldIncludeFile(filepath) {
            if (shouldSkip(filepath)) return false;
            const ext = getExtension(filepath);
            if (MARKUP_EXTENSIONS.has(ext)) return true;
            if (AMBIGUOUS_EXTENSIONS.has(ext)) {
              try {
                const content = fs.readFileSync(filepath, "utf-8");
                return containsMarkup(content);
              } catch { return false; }
            }
            return false;
          }

          console.log("🔍 Collecting files...");
          const allFiles = await glob("**/*", {
            nodir: true,
            dot: false,
            ignore: ["node_modules/**", "dist/**", "build/**"],
          });

          const webFiles = allFiles.filter(shouldIncludeFile);
          const filesToScan = MAX_FILES > 0 ? webFiles.slice(0, MAX_FILES) : webFiles;

          console.log("📁 Found " + webFiles.length + " web files. Scanning " + filesToScan.length + ".");

          if (filesToScan.length === 0) {
            console.log("✅ No web files found to scan.");
            fs.writeFileSync("scan-results.json", JSON.stringify({ issues: [], totalFiles: 0 }));
            process.exit(0);
          }

          const ollama = new Ollama({
            host: "https://ollama.com",
            headers: {
              Authorization: "Bearer " + API_KEY,
            },
          });

          const MODEL = "qwen3.5:cloud; // Change to minimax-m2.7:cloud or glm-5:cloud if preferred

          const SYSTEM_PROMPT = fs.readFileSync("system-prompt.txt", "utf-8");

          const batches = [];
          for (let i = 0; i < filesToScan.length; i += BATCH_SIZE) {
            batches.push(filesToScan.slice(i, i + BATCH_SIZE));
          }

          console.log("📦 Processing " + batches.length + " batch(es) of up to " + BATCH_SIZE + " files each...");

          const allIssues = [];
          let successfulBatches = 0;
          let failedBatches = 0;

          for (let batchIndex = 0; batchIndex < batches.length; batchIndex++) {
            const batch = batches[batchIndex];
            console.log("\n⏳ Batch " + (batchIndex + 1) + "/" + batches.length + " (" + batch.length + " files)...");

            let userPrompt = "Analyze the following " + batch.length + " source file(s) for WCAG 2.2 AA accessibility issues.\n\n";

            for (const filepath of batch) {
              try {
                const content = fs.readFileSync(filepath, "utf-8");
                // Truncate very large files to avoid token limits
                const truncated = content.length > 50000
                  ? content.slice(0, 50000) + "\n... [truncated at 50000 chars]"
                  : content;
                userPrompt += "[FILE] " + filepath + "\n[CONTENT]\n" + truncated + "\n[END FILE]\n\n";
              } catch (e) {
                console.warn("  ⚠️  Could not read " + filepath + ": " + e.message);
              }
            }

            let batchSuccess = false;
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                const response = await ollama.chat({
                  model: MODEL,
                  messages: [
                    { role: "system", content: SYSTEM_PROMPT },
                    { role: "user",   content: userPrompt },
                  ],
                  format: "json",
                  options: { temperature: 0.1, num_ctx: 32768 },
                });

                const content = response.message?.content;
                if (!content) throw new Error("Ollama returned empty response");

                let clean = content.trim();
                if (clean.startsWith("```")) {
                  clean = clean.replace(/^```json?\s*/i, "").replace(/\s*```$/, "");
                }

                const parsed = JSON.parse(clean);

                if (Array.isArray(parsed.issues)) {
                  allIssues.push(...parsed.issues);
                  console.log("  ✅ " + parsed.issues.length + " issue(s) found");
                  batchSuccess = true;
                  break;
                }
              } catch (err) {
                const isRateLimit = err.message?.includes("429") || err.message?.includes("rate");
                console.warn("  ⚠️  Attempt " + attempt + " failed: " + err.message);
                if (isRateLimit && attempt < 3) {
                  const delay = 1000 * Math.pow(2, attempt);
                  console.log("  ⏳ Rate limited — waiting " + delay + "ms...");
                  await new Promise(r => setTimeout(r, delay));
                } else if (attempt === 3) {
                  failedBatches++;
                }
              }
            }

            if (batchSuccess) successfulBatches++;

            // Brief pause between batches to respect rate limits
            if (batchIndex < batches.length - 1) {
              await new Promise(r => setTimeout(r, 1000));
            }
          }

          const results = {
            scannedAt: new Date().toISOString(),
            totalFiles: filesToScan.length,
            totalBatches: batches.length,
            successfulBatches,
            failedBatches,
            issues: allIssues,
          };

          fs.writeFileSync("scan-results.json", JSON.stringify(results, null, 2));
          console.log("\n📊 Scan complete: " + allIssues.length + " total issue(s) across " + filesToScan.length + " file(s).");
          if (failedBatches > 0) {
            console.warn("⚠️  " + failedBatches + " batch(es) failed and were skipped.");
          }
          EOF

          node full-scan.mjs

      - name: Generate Markdown report
        run: |
          cat << 'EOF' > generate-report.mjs
          import fs from "fs";

          const data = JSON.parse(fs.readFileSync("scan-results.json", "utf-8"));
          const { issues, totalFiles, scannedAt, failedBatches } = data;

          const counts = { CRITICAL: 0, SERIOUS: 0, MODERATE: 0, MINOR: 0 };
          for (const issue of issues) counts[issue.severity] = (counts[issue.severity] || 0) + 1;

          const byFile = {};
          for (const issue of issues) {
            if (!byFile[issue.file]) byFile[issue.file] = [];
            byFile[issue.file].push(issue);
          }

          const ICONS = { CRITICAL: "🔴", SERIOUS: "🟠", MODERATE: "🟡", MINOR: "🔵" };

          let md = "# ♿ Accessibility Full Codebase Scan Report\n\n";
          md += "**Scanned at:** " + new Date(scannedAt).toUTCString() + "  \n";
          md += "**Files scanned:** " + totalFiles + "  \n";
          if (failedBatches > 0) {
            md += "**⚠️ Failed batches:** " + failedBatches + " (results may be incomplete)  \n";
          }
          md += "\n";

          md += "## Summary\n\n";
          md += "| Severity | Count |\n|---|---|\n";
          md += "| 🔴 CRITICAL | " + counts.CRITICAL + " |\n";
          md += "| 🟠 SERIOUS  | " + counts.SERIOUS  + " |\n";
          md += "| 🟡 MODERATE | " + counts.MODERATE + " |\n";
          md += "| 🔵 MINOR    | " + counts.MINOR    + " |\n";
          md += "| **Total**   | **" + issues.length + "** |\n\n";

          if (issues.length === 0) {
            md += "✅ No accessibility issues found.\n";
          } else {
            md += "## Issues by File\n\n";
            for (const [file, fileIssues] of Object.entries(byFile)) {
              md += "### `" + file + "`\n\n";
              for (const issue of fileIssues) {
                const icon = ICONS[issue.severity] || "⚪";
                const line = issue.line ? " (line " + issue.line + ")" : "";
                md += "#### " + icon + " " + issue.severity + ": " + issue.title + line + "\n\n";
                md += "- **WCAG:** " + issue.wcag_criterion + " (Level " + issue.wcag_level + ")\n";
                md += "- **Confidence:** " + issue.confidence + "\n";
                md += "- **Description:** " + issue.description + "\n";
                md += "- **User Impact:** " + issue.impact + "\n";
                md += "- **Suggested Fix:**\n```\n" + issue.suggestion + "\n```\n\n";
              }
            }
          }

          fs.writeFileSync("a11y-full-report.md", md);
          console.log("📄 Markdown report written to a11y-full-report.md");
          EOF

          node generate-report.mjs

      - name: Upload scan artifacts
        uses: actions/upload-artifact@v4
        with:
          name: a11y-full-scan-${{ github.run_id }}
          path: |
            a11y-full-report.md
            scan-results.json

      - name: Create GitHub Issue with results
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const report = fs.readFileSync("a11y-full-report.md", "utf-8");
            const data = JSON.parse(fs.readFileSync("scan-results.json", "utf-8"));

            const counts = { CRITICAL: 0, SERIOUS: 0, MODERATE: 0, MINOR: 0 };
            for (const issue of data.issues) counts[issue.severity] = (counts[issue.severity] || 0) + 1;

            const MAX_BODY = 60000;
            let body = report.length > MAX_BODY
              ? report.slice(0, MAX_BODY) + "\n\n---\n⚠️ Report truncated. Download the full artifact for complete results."
              : report;

            const title = "[A11y Audit] Full Codebase Scan — " + data.issues.length + " issue(s) found (" + new Date().toISOString().split("T")[0] + ")";

            const labels = [];
            if (counts.CRITICAL > 0) labels.push("accessibility:critical");
            if (counts.SERIOUS > 0)  labels.push("accessibility:serious");
            labels.push("accessibility");

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: label.includes("critical") ? "d73a4a" : label.includes("serious") ? "e4a11b" : "0075ca",
                });
              } catch {}
            }

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels,
            });

            console.log("✅ Issue created: " + issue.html_url);

  url-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright @axe-core/playwright lighthouse
          npm install -g pa11y

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Axe-core via Playwright
        env:
          TEST_URLS: "https://your-staging-url.com"
        run: |
          cat << 'EOF' > axe-test.js
          const { chromium } = require('playwright');
          const AxeBuilder = require('@axe-core/playwright').default;

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext({ ignoreHTTPSErrors: true });
            const urls = process.env.TEST_URLS.split(',');

            for (const rawUrl of urls) {
              const url = rawUrl.trim();
              if (!url) continue;

              console.log("\n🔍 Axe: Testing " + url);
              const page = await context.newPage();
              await page.goto(url, { waitUntil: 'networkidle' });

              const results = await new AxeBuilder({ page }).analyze();

              if (results.violations.length > 0) {
                console.log("❌ " + results.violations.length + " violation(s) found");
                results.violations.forEach(v => {
                  console.log("\n[" + v.id + "] " + v.help);
                  console.log("Impact: " + v.impact);
                  console.log("Help: " + v.helpUrl);
                  v.nodes.forEach(node => {
                    console.log("  Target: " + node.target.join(', '));
                    console.log("  HTML: " + node.html);
                  });
                });
              } else {
                console.log('✅ No Axe violations found');
              }

              await page.close();
            }

            await browser.close();
          })();
          EOF

          node axe-test.js

      - name: Run Lighthouse
        env:
          AUDIT_URL: "https://your-staging-url.com"
        run: |
          mkdir -p lighthouse-reports
          url_trimmed=$(echo "$AUDIT_URL" | xargs)
          safe_name=$(echo "$url_trimmed" | sed 's/[^a-zA-Z0-9]/_/g')

          echo "🔍 Lighthouse: $url_trimmed"

          npx lighthouse "$url_trimmed" \
            --only-categories=accessibility \
            --chrome-flags="--headless --no-sandbox" \
            --output=json \
            --output-path="lighthouse-reports/$safe_name.json"

          score=$(node -e "
            const r = require('./lighthouse-reports/$safe_name.json');
            console.log(Math.round(r.categories.accessibility.score * 100));
          ")

          if [ "$score" -ge 90 ]; then icon="🟢"
          elif [ "$score" -ge 50 ]; then icon="🟡"
          else icon="🔴"
          fi

          echo "$icon Lighthouse Accessibility Score: $score/100"

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: lighthouse-reports

      - name: Create Pa11y config
        run: |
          cat > pa11y.json << 'EOF'
          {
            "chromeLaunchConfig": {
              "args": ["--no-sandbox", "--disable-setuid-sandbox"]
            }
          }
          EOF

      - name: Run Pa11y
        env:
          AUDIT_URL: "https://your-staging-url.com"
        run: |
          url_trimmed=$(echo "$AUDIT_URL" | xargs)
          echo "🔍 Pa11y: $url_trimmed"

          pa11y "$url_trimmed" \
            --standard WCAG2AA \
            --config ./pa11y.json || true

          echo "----------------------------------"
