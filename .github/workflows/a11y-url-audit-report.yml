name: Accessibility Audit Report

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Comma-separated URLs to test"
        required: true
        default: "https://example.com"

jobs:
  a11y:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install deps
        run: |
          npm init -y
          npm install playwright @axe-core/playwright lighthouse
          npm install -g pa11y

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run axe-core (Playwright)
        run: |
          cat << 'EOF' > axe-test.js
          const { chromium } = require('playwright');
          const AxeBuilder = require('@axe-core/playwright').default;
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext({ ignoreHTTPSErrors: true });
            const urls = process.env.TEST_URLS.split(',');
            const allResults = [];

            for (const rawUrl of urls) {
              const url = rawUrl.trim();
              if (!url) continue;

              console.log(`\n Axe testing: ${url}`);
              const page = await context.newPage();
              await page.goto(url, { waitUntil: 'networkidle' });

              const results = await new AxeBuilder({ page }).analyze();
              allResults.push({ url, violations: results.violations, passes: results.passes });

              const vCount = results.violations.length;
              console.log(vCount > 0 ? `❌ ${vCount} violations` : '✅ No violations');

              await page.close();
            }

            fs.writeFileSync('axe-results.json', JSON.stringify(allResults, null, 2));
            console.log('\n axe-results.json written');
            await browser.close();
          })();
          EOF

          TEST_URLS="${{ github.event.inputs.urls }}" node axe-test.js

      - name: Run Lighthouse
        run: |
          mkdir -p lighthouse-reports
          urls="${{ github.event.inputs.urls }}"
          IFS=',' read -ra URL_ARRAY <<< "$urls"

          for url in "${URL_ARRAY[@]}"; do
            url_trimmed=$(echo "$url" | xargs)
            safe_name=$(echo "$url_trimmed" | sed 's/[^a-zA-Z0-9]/_/g')

            echo "Lighthouse: $url_trimmed"

            npx lighthouse "$url_trimmed" \
              --only-categories=accessibility \
              --chrome-flags="--headless" \
              --output=json \
              --output-path="lighthouse-reports/$safe_name.json"

            score=$(node -e "
              const r = require('./lighthouse-reports/$safe_name.json');
              console.log(Math.round(r.categories.accessibility.score * 100));
            ")

            if   [ "$score" -ge 90 ]; then icon="🟢 Pass"
            elif [ "$score" -ge 50 ]; then icon="🟡 Needs Improvement"
            else                           icon="🔴 Critical Fail"
            fi

            echo "$icon — Score: $score / 100"
            echo "----------------------------------"
          done

      - name: Create Pa11y config
        run: |
          cat > pa11y.json << 'EOF'
          {
            "chromeLaunchConfig": {
              "args": ["--no-sandbox", "--disable-setuid-sandbox"]
            }
          }
          EOF

      - name: Run Pa11y
        run: |
          urls="${{ github.event.inputs.urls }}"
          IFS=',' read -ra URL_ARRAY <<< "$urls"
          mkdir -p pa11y-raw
          idx=0

          for url in "${URL_ARRAY[@]}"; do
            url_trimmed=$(echo "$url" | xargs)
            echo "Pa11y: $url_trimmed"

            # Writing output to file to avoid corruption on empty result.
            # Later validated and merged.
            pa11y "$url_trimmed" \
              --standard WCAG2AA \
              --reporter json \
              --config ./pa11y.json \
              > "pa11y-raw/${idx}.json" 2>/dev/null || true

            node -e "
              const fs = require('fs');
              const file = process.argv[1];
              let issues = [];
              try {
                const raw = fs.readFileSync(file, 'utf8').trim();
                if (raw) issues = JSON.parse(raw);
                if (!Array.isArray(issues)) issues = [];
              } catch(e) {}
              fs.writeFileSync(file, JSON.stringify(issues));
            " "pa11y-raw/${idx}.json"

            issue_count=$(node -e "
              const fs = require('fs');
              try { console.log(JSON.parse(fs.readFileSync(process.argv[1], 'utf8')).length); }
              catch { console.log(0); }
            " "pa11y-raw/${idx}.json")
            echo "$issue_count issue(s) found"
            echo "----------------------------------"

            echo "$url_trimmed" > "pa11y-raw/${idx}.url"
            idx=$((idx + 1))
          done

          node -e "
            const fs = require('fs');
            const dir = 'pa11y-raw';
            const results = [];
            const jsonFiles = fs.readdirSync(dir)
              .filter(f => f.endsWith('.json'))
              .sort((a, b) => parseInt(a) - parseInt(b));
            for (const f of jsonFiles) {
              const idx = f.replace('.json', '');
              const urlFile = dir + '/' + idx + '.url';
              const pageUrl = fs.existsSync(urlFile)
                ? fs.readFileSync(urlFile, 'utf8').trim()
                : 'unknown';
              let issues = [];
              try { issues = JSON.parse(fs.readFileSync(dir + '/' + f, 'utf8')); } catch {}
              results.push({ pageUrl, issues });
            }
            fs.writeFileSync('pa11y-results.json', JSON.stringify(results, null, 2));
            console.log('pa11y-results.json written (' + results.length + ' URL(s))');
          "

      - name: Generate consolidated Markdown report
        run: |
          # NOTE: Could reference to generate-report.js for clearer setup
          # Using inline for no dependency as of now.
          cat << 'SCRIPT' > generate-report.js
          const fs = require('fs'), path = require('path');
          function safeRead(f){try{return JSON.parse(fs.readFileSync(f,'utf8'));}catch{return null;}}
          const axeRaw=safeRead('axe-results.json')||[], pa11yRaw=safeRead('pa11y-results.json')||[], lhDir='lighthouse-reports';
          const allUrls=new Set([...axeRaw.map(r=>r.url),...pa11yRaw.map(r=>r.pageUrl)]);
          function normalizeHtml(h){return(h||'').replace(/\s+/g,' ').trim().slice(0,200);}
          function mdEscape(s){return String(s||'').replace(/</g,'\\<').replace(/>/g,'\\>').replace(/\|/g,'\\|');}
          const findings=new Map();
          function upsert(ruleId,description,impact,helpUrl,source,html,target,url){
            const key=`${ruleId}::${normalizeHtml(html)}`;
            if(!findings.has(key))findings.set(key,{ruleId,description,impact,helpUrl,sources:new Set(),nodes:[]});
            const f=findings.get(key); f.sources.add(source);
            if(!f.nodes.some(n=>normalizeHtml(n.html)===normalizeHtml(html)))f.nodes.push({html:html||'',target:target||'',url:url||''});
          }
          for(const r of axeRaw)for(const v of(r.violations||[]))for(const n of(v.nodes||[]))
            upsert(v.id,v.help||v.description||'',v.impact||'unknown',v.helpUrl||'','axe',n.html,Array.isArray(n.target)?n.target.join(', '):(n.target||''),r.url);
          for(const r of pa11yRaw)for(const i of(r.issues||[]))
            upsert(i.code,i.message||'',i.type==='error'?'serious':'minor','https://www.w3.org/TR/WCAG21/','pa11y',i.context||'',i.selector||'',r.pageUrl);
          const impactOrder={critical:0,serious:1,moderate:2,minor:3,warning:4,unknown:5};
          const allFindings=[...findings.values()].sort((a,b)=>(impactOrder[a.impact]??5)-(impactOrder[b.impact]??5));
          const lhScores={};
          if(fs.existsSync(lhDir))for(const f of fs.readdirSync(lhDir)){
            if(!f.endsWith('.json'))continue;
            const lh=safeRead(path.join(lhDir,f)); if(!lh)continue;
            lhScores[lh.finalUrl||lh.requestedUrl||f.replace('.json','')]=Math.round((lh.categories?.accessibility?.score??0)*100);
          }
          const sv=Object.values(lhScores), agg=sv.length?Math.round(sv.reduce((a,b)=>a+b,0)/sv.length):null;
          const countByImpact={};
          for(const f of allFindings)countByImpact[f.impact]=(countByImpact[f.impact]||0)+1;
          const totalErrors=(countByImpact.critical||0)+(countByImpact.serious||0);
          const totalWarnings=(countByImpact.moderate||0)+(countByImpact.minor||0)+(countByImpact.warning||0);
          const EMOJI={critical:'🔴',serious:'🟠',moderate:'🟡',minor:'🟢',warning:'⚪',unknown:'⚫'};
          function scoreLine(s){if(s===null)return'N/A';if(s>=90)return`${s}/100 🟢 Pass`;if(s>=50)return`${s}/100 🟡 Needs Improvement`;return`${s}/100 🔴 Critical Fail`;}
          function fence(c){return'```\n'+String(c).replace(/`{3}/g,'\\`\\`\\`')+'\n```';}
          const L=[];
          L.push(`# A11y Compliance Report`,``,`> **Generated:** ${new Date().toUTCString()}  `,`> **URLs audited:** ${allUrls.size}  `,`> **Tools:** Axe-core · Pa11y · Lighthouse`,``,`---`,``);
          L.push(`## Lighthouse Score`);
          L.push(``,agg!==null?`**Overall (average):** ${scoreLine(agg)}`:`_No Lighthouse data found._`,``);
          if(Object.keys(lhScores).length){L.push(`| URL | Score |`,`|-----|-------|`);for(const[u,s]of Object.entries(lhScores))L.push(`| ${u} | ${scoreLine(s)} |`);L.push(``);}
          L.push(`> [How is the Lighthouse accessibility score calculated?](https://developer.chrome.com/docs/lighthouse/accessibility/scoring)`,``,`---`,``);
          L.push(`## Summary`,``,`| Metric | Count |`,`|--------|-------|`,`| 🔴 Errors (critical + serious) | **${totalErrors}** |`,`| 🟡 Warnings (moderate + minor) | **${totalWarnings}** |`,`| 🔵 Unique violations (deduplicated) | **${allFindings.length}** |`,``,`---`,``);
          L.push(`## Findings`);
          if(allFindings.length===0){L.push(``,`✅ **No violations found across all tools.**`,``);}
          else{
            L.push(``,`_Sorted by impact severity. Deduplicated across Axe and Pa11y._`,``);
            for(const f of allFindings){
              L.push(``,`### ${EMOJI[f.impact]||'⚫'} \`${f.ruleId}\``,``,`| Field | Value |`,`|-------|-------|`,`| **Impact** | ${f.impact} |`,`| **Source(s)** | ${[...f.sources].join(', ')} |`,`| **Description** | ${mdEscape(f.description)} |`);
              if(f.helpUrl)L.push(`| **Reference** | [More info](${f.helpUrl}) |`);
              L.push(``,`**Affected elements** (${f.nodes.length}):`);
              for(const[i,n]of f.nodes.entries()){L.push(``);if(n.url)L.push(`_URL:_ ${n.url}`);if(n.target)L.push(`_Target:_ \`${n.target}\``);if(n.html)L.push(fence(n.html));}
            }
          }
          L.push(``,`---`,``,`*Report generated by Axe-core, Pa11y, and Lighthouse via GitHub Actions.*  `,`*[Lighthouse Scoring Documentation](https://developer.chrome.com/docs/lighthouse/accessibility/scoring)*`);
          fs.mkdirSync('a11y-report',{recursive:true});
          fs.writeFileSync('a11y-report/report.md',L.join('\n'),'utf8');
          console.log(`✅ Report written → a11y-report/report.md`);
          console.log(`   Unique violations : ${allFindings.length}`);
          console.log(`   Errors            : ${totalErrors}`);
          console.log(`   Warnings          : ${totalWarnings}`);
          if(agg!==null)console.log(`   Lighthouse Score  : ${scoreLine(agg)}`);
          SCRIPT

          node generate-report.js

      - name: Upload A11y Report
        uses: actions/upload-artifact@v4
        with:
          name: a11y-compliance-report
          path: a11y-report/report.md
