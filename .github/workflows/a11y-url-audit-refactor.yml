name: Accessibility Audit Refactor

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Comma-separated URLs to test"
        required: true
        default: "https://example.com"

jobs:
  a11y:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install deps
        run: |
          npm init -y
          npm install playwright @axe-core/playwright lighthouse
          npm install -g pa11y

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # ── AXE + PLAYWRIGHT ──────────────────────────────────────────────────
      # Outputs structured JSON to axe-results.json for the report generator.
      # Each entry: { url, violations[], passes[] }
      - name: Run axe-core (Playwright)
        run: |
          cat << 'EOF' > axe-test.js
          const { chromium } = require('playwright');
          const AxeBuilder = require('@axe-core/playwright').default;
          const fs = require('fs');

          (async () => {
            const browser = await chromium.launch();
            const context = await browser.newContext({ ignoreHTTPSErrors: true });
            const urls = process.env.TEST_URLS.split(',');
            const allResults = [];

            for (const rawUrl of urls) {
              const url = rawUrl.trim();
              if (!url) continue;

              console.log(`\n🔍 Axe testing: ${url}`);
              const page = await context.newPage();
              await page.goto(url, { waitUntil: 'networkidle' });

              const results = await new AxeBuilder({ page }).analyze();
              allResults.push({ url, violations: results.violations, passes: results.passes });

              const vCount = results.violations.length;
              console.log(vCount > 0 ? `❌ ${vCount} violations` : '✅ No violations');

              await page.close();
            }

            fs.writeFileSync('axe-results.json', JSON.stringify(allResults, null, 2));
            console.log('\n📄 axe-results.json written');
            await browser.close();
          })();
          EOF

          TEST_URLS="${{ github.event.inputs.urls }}" node axe-test.js

      # ── LIGHTHOUSE ────────────────────────────────────────────────────────
      # Saves one JSON per URL; report generator reads these for scoring.
      - name: Run Lighthouse
        run: |
          mkdir -p lighthouse-reports
          urls="${{ github.event.inputs.urls }}"
          IFS=',' read -ra URL_ARRAY <<< "$urls"

          for url in "${URL_ARRAY[@]}"; do
            url_trimmed=$(echo "$url" | xargs)
            safe_name=$(echo "$url_trimmed" | sed 's/[^a-zA-Z0-9]/_/g')

            echo "🔍 Lighthouse: $url_trimmed"

            npx lighthouse "$url_trimmed" \
              --only-categories=accessibility \
              --chrome-flags="--headless" \
              --output=json \
              --output-path="lighthouse-reports/$safe_name.json"

            score=$(node -e "
              const r = require('./lighthouse-reports/$safe_name.json');
              console.log(Math.round(r.categories.accessibility.score * 100));
            ")

            if   [ "$score" -ge 90 ]; then icon="🟢 Pass"
            elif [ "$score" -ge 50 ]; then icon="🟡 Needs Improvement"
            else                           icon="🔴 Critical Fail"
            fi

            echo "$icon — Score: $score / 100"
            echo "----------------------------------"
          done

      # ── PA11Y ─────────────────────────────────────────────────────────────
      # Uses JSON reporter so findings can be merged in the report generator.
      - name: Create Pa11y config
        run: |
          cat > pa11y.json << 'EOF'
          {
            "chromeLaunchConfig": {
              "args": ["--no-sandbox", "--disable-setuid-sandbox"]
            }
          }
          EOF

      - name: Run Pa11y
        run: |
          urls="${{ github.event.inputs.urls }}"
          IFS=',' read -ra URL_ARRAY <<< "$urls"
          all_results="[]"

          for url in "${URL_ARRAY[@]}"; do
            url_trimmed=$(echo "$url" | xargs)
            echo "🔍 Pa11y: $url_trimmed"

            # pa11y exits non-zero when it finds issues — suppress with || true
            result=$(pa11y "$url_trimmed" \
              --standard WCAG2AA \
              --reporter json \
              --config ./pa11y.json 2>/dev/null || echo '[]')

            # Wrap in { pageUrl, issues } to match our schema
            entry=$(node -e "
              const issues = JSON.parse(process.env.RESULT || '[]');
              console.log(JSON.stringify({ pageUrl: process.env.URL, issues }));
            " URL="$url_trimmed" RESULT="$result")

            # Append to running array
            all_results=$(node -e "
              const arr = JSON.parse(process.env.ARR);
              arr.push(JSON.parse(process.env.ENTRY));
              console.log(JSON.stringify(arr));
            " ARR="$all_results" ENTRY="$entry")

            issue_count=$(echo "$result" | node -e "
              let d='';process.stdin.on('data',c=>d+=c).on('end',()=>{
                try{console.log(JSON.parse(d).length)}catch{console.log(0)}
              });
            ")
            echo "$issue_count issue(s) found"
            echo "----------------------------------"
          done

          echo "$all_results" > pa11y-results.json
          echo "📄 pa11y-results.json written"

      # ── GENERATE CONSOLIDATED REPORT ─────────────────────────────────────
      - name: Download report generator
        run: |
          # Copy the generator script (checked-in at repo root)
          # If you prefer, commit generate-report.js to your repo and
          # actions/checkout instead of the inline approach below
          cat << 'SCRIPT' > generate-report.js
          /**
           * generate-report.js  –  merged into workflow for portability.
           * For a cleaner setup, commit this file to your repo and remove
           * this step, relying on actions/checkout to provide it.
           *
           * See the standalone generate-report.js in this PR for the full
           * annotated source.
           */
          const fs   = require('fs');
          const path = require('path');

          function safeRead(file) {
            try { return JSON.parse(fs.readFileSync(file, 'utf8')); }
            catch { return null; }
          }

          const axeRaw   = safeRead('axe-results.json')   || [];
          const pa11yRaw = safeRead('pa11y-results.json')  || [];
          const lhDir    = 'lighthouse-reports';

          const allUrls = new Set([
            ...axeRaw.map(r => r.url),
            ...pa11yRaw.map(r => r.pageUrl),
          ]);

          function normalizeHtml(html) {
            return (html || '').replace(/\s+/g, ' ').trim().slice(0, 200);
          }

          const findings = new Map();

          function upsert(ruleId, description, impact, helpUrl, source, html, target) {
            const key = `${ruleId}::${normalizeHtml(html)}`;
            if (!findings.has(key)) {
              findings.set(key, { ruleId, description, impact, helpUrl, sources: new Set(), nodes: [] });
            }
            const f = findings.get(key);
            f.sources.add(source);
            if (!f.nodes.some(n => normalizeHtml(n.html) === normalizeHtml(html))) {
              f.nodes.push({ html: html || '', target: target || '' });
            }
          }

          for (const result of axeRaw) {
            for (const v of (result.violations || [])) {
              for (const node of (v.nodes || [])) {
                upsert(v.id, v.help || v.description || '', v.impact || 'unknown',
                  v.helpUrl || '', 'axe', node.html,
                  Array.isArray(node.target) ? node.target.join(', ') : (node.target || ''));
              }
            }
          }

          for (const result of pa11yRaw) {
            for (const issue of (result.issues || [])) {
              upsert(issue.code, issue.message || '',
                issue.type === 'error' ? 'serious' : 'minor',
                'https://www.w3.org/TR/WCAG21/', 'pa11y',
                issue.context || '', issue.selector || '');
            }
          }

          const allFindings = [...findings.values()];
          const impactOrder = { critical:0, serious:1, moderate:2, minor:3, warning:4, unknown:5 };
          allFindings.sort((a,b)=>(impactOrder[a.impact]??5)-(impactOrder[b.impact]??5));

          const lhScores = {};
          if (fs.existsSync(lhDir)) {
            for (const file of fs.readdirSync(lhDir)) {
              if (!file.endsWith('.json')) continue;
              const lh = safeRead(path.join(lhDir, file));
              if (!lh) continue;
              const url = lh.finalUrl || lh.requestedUrl || file.replace('.json','');
              lhScores[url] = Math.round((lh.categories?.accessibility?.score ?? 0) * 100);
            }
          }

          const scoreValues = Object.values(lhScores);
          const aggregateScore = scoreValues.length
            ? Math.round(scoreValues.reduce((a,b)=>a+b,0)/scoreValues.length) : null;

          const countByImpact = {};
          for (const f of allFindings) countByImpact[f.impact] = (countByImpact[f.impact]||0)+1;
          const totalErrors   = (countByImpact.critical||0)+(countByImpact.serious||0);
          const totalWarnings = (countByImpact.moderate||0)+(countByImpact.minor||0)+(countByImpact.warning||0);

          function scoreTier(s) {
            if (s===null) return {label:'N/A',cls:'score-na'};
            if (s>=90)   return {label:'Pass',cls:'score-pass'};
            if (s>=50)   return {label:'Needs Improvement',cls:'score-warn'};
            return             {label:'Critical Fail',cls:'score-fail'};
          }
          function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
          function impactBadge(impact){const m={critical:'#d93025',serious:'#e37400',moderate:'#fbbc04',minor:'#4caf50',warning:'#9e9e9e',unknown:'#757575'};return `<span class="badge" style="background:${m[impact]||'#757575'}">${impact}</span>`;}
          function sourcePill(s){const m={axe:'#5c6bc0',pa11y:'#00838f'};return `<span class="pill" style="background:${m[s]||'#78909c'}">${s}</span>`;}

          const si = aggregateScore!==null?scoreTier(aggregateScore):{label:'N/A',cls:'score-na'};
          const sd = aggregateScore!==null?`${aggregateScore}/100`:'N/A';
          const generatedAt = new Date().toUTCString();

          const urlRows = Object.entries(lhScores).map(([url,score])=>{
            const t=scoreTier(score);
            return `<tr><td><a href="${escHtml(url)}" target="_blank">${escHtml(url)}</a></td><td><span class="score-badge ${t.cls}">${score}/100 — ${t.label}</span></td></tr>`;
          }).join('\n');

          const findingCards = allFindings.map((f,i)=>{
            const pills=[...f.sources].map(sourcePill).join(' ');
            const nodeRows=f.nodes.map(n=>`<div class="node-row"><div class="node-label">Target</div><code>${escHtml(n.target)}</code><div class="node-label">HTML</div><pre>${escHtml(n.html)}</pre></div>`).join('');
            const helpLink=f.helpUrl?`<a href="${escHtml(f.helpUrl)}" target="_blank" class="help-link">More info ↗</a>`:'';
            return `<details class="finding" id="finding-${i}"><summary><span class="finding-header">${impactBadge(f.impact)} ${pills} <span class="rule-id">${escHtml(f.ruleId)}</span> <span class="description">${escHtml(f.description)}</span><span class="node-count">${f.nodes.length} element${f.nodes.length!==1?'s':''}</span></span></summary><div class="finding-body">${helpLink}<div class="nodes">${nodeRows}</div></div></details>`;
          }).join('\n');

          const html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>A11y Compliance Report</title><style>:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#22263a;--border:#2e3250;--text:#e8eaf6;--text-muted:#7986cb;--accent:#5c6bc0;--pass:#43a047;--warn:#fb8c00;--fail:#e53935;--radius:8px;--font-mono:'JetBrains Mono','Fira Code',monospace}*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:2rem}a{color:var(--accent)}h1{font-size:1.8rem;font-weight:700;letter-spacing:-.02em}h2{font-size:1.1rem;font-weight:600;color:var(--text-muted);margin-bottom:1rem;text-transform:uppercase;letter-spacing:.08em}.report-header{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1.5rem;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}.report-meta{font-size:.8rem;color:var(--text-muted);margin-top:.4rem}.score-hero{text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem 2.5rem;min-width:220px}.score-number{font-size:3rem;font-weight:800;letter-spacing:-.04em;line-height:1}.score-label{font-size:.85rem;margin-top:.3rem;font-weight:600}.score-pass{color:var(--pass)}.score-warn{color:var(--warn)}.score-fail{color:var(--fail)}.score-na{color:var(--text-muted)}.score-badge{font-size:.8rem;padding:.2rem .6rem;border-radius:99px;font-weight:600}.score-docs{display:block;font-size:.75rem;margin-top:.6rem;color:var(--text-muted)}.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:2rem}.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.2rem;text-align:center}.stat-number{font-size:2.2rem;font-weight:800;line-height:1}.stat-label{font-size:.75rem;color:var(--text-muted);margin-top:.3rem;text-transform:uppercase;letter-spacing:.06em}.stat-errors .stat-number{color:#ef5350}.stat-warnings .stat-number{color:#ffa726}.stat-unique .stat-number{color:var(--accent)}.url-section{margin-bottom:2rem}table{width:100%;border-collapse:collapse;font-size:.88rem}th{text-align:left;padding:.5rem .75rem;color:var(--text-muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border)}td{padding:.6rem .75rem;border-bottom:1px solid var(--border)}tr:last-child td{border-bottom:none}.findings-section{margin-top:2rem}.findings-count{font-size:.85rem;color:var(--text-muted);margin-bottom:1rem}details.finding{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.6rem;overflow:hidden}details.finding[open]{border-color:var(--accent)}details.finding summary{cursor:pointer;padding:.85rem 1rem;list-style:none;user-select:none}details.finding summary::-webkit-details-marker{display:none}details.finding summary:hover{background:var(--surface2)}.finding-header{display:flex;align-items:center;flex-wrap:wrap;gap:.5rem;font-size:.88rem}.rule-id{font-family:var(--font-mono);font-size:.8rem;color:var(--text-muted)}.description{flex:1;font-weight:500}.node-count{margin-left:auto;font-size:.75rem;color:var(--text-muted);white-space:nowrap}.finding-body{padding:.75rem 1rem 1rem;border-top:1px solid var(--border)}.help-link{font-size:.82rem;display:inline-block;margin-bottom:.75rem}.node-row{margin-bottom:.75rem}.node-label{font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);margin-bottom:.2rem}.node-row code{font-family:var(--font-mono);font-size:.78rem;color:#80cbc4}.node-row pre{font-family:var(--font-mono);font-size:.78rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:.5rem .75rem;overflow-x:auto;margin-top:.2rem;color:#b2dfdb;white-space:pre-wrap;word-break:break-all}.badge,.pill{display:inline-block;font-size:.7rem;font-weight:700;padding:.15rem .5rem;border-radius:99px;color:#fff;text-transform:uppercase;letter-spacing:.04em}.empty{text-align:center;padding:3rem;color:var(--text-muted)}.empty-icon{font-size:3rem;display:block;margin-bottom:.5rem}footer{margin-top:3rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.78rem;color:var(--text-muted);text-align:center}</style></head><body>
          <div class="report-header"><div><h1>♿ A11y Compliance Report</h1><div class="report-meta">Generated: ${generatedAt}</div><div class="report-meta">URLs audited: ${allUrls.size} &nbsp;|&nbsp; Tools: Axe-core, Pa11y, Lighthouse</div></div><div class="score-hero"><div class="score-number ${si.cls}">${sd}</div><div class="score-label ${si.cls}">${si.label}</div><a class="score-docs" href="https://developer.chrome.com/docs/lighthouse/accessibility/scoring" target="_blank">How is this score calculated? ↗</a></div></div>
          <section><h2>Summary</h2><div class="summary-grid"><div class="stat-card stat-errors"><div class="stat-number">${totalErrors}</div><div class="stat-label">Errors</div></div><div class="stat-card stat-warnings"><div class="stat-number">${totalWarnings}</div><div class="stat-label">Warnings</div></div><div class="stat-card stat-unique"><div class="stat-number">${allFindings.length}</div><div class="stat-label">Unique Violations</div></div></div></section>
          ${urlRows?`<section class="url-section"><h2>Lighthouse Scores per URL</h2><table><thead><tr><th>URL</th><th>Accessibility Score</th></tr></thead><tbody>${urlRows}</tbody></table></section>`:''}
          <section class="findings-section"><h2>Unique Findings</h2>${allFindings.length===0?`<div class="empty"><span class="empty-icon">✅</span>No violations found.</div>`:`<div class="findings-count">${allFindings.length} unique violation${allFindings.length!==1?'s':''} — click any row to expand details</div>${findingCards}`}</section>
          <footer>A11y Audit &middot; Axe-core, Pa11y &amp; Lighthouse &middot; <a href="https://developer.chrome.com/docs/lighthouse/accessibility/scoring" target="_blank">Lighthouse Scoring Docs</a></footer>
          </body></html>`;

          fs.mkdirSync('a11y-report', { recursive: true });
          fs.writeFileSync('a11y-report/report.html', html, 'utf8');
          console.log(`✅ Report written → a11y-report/report.html`);
          console.log(`   Unique violations : ${allFindings.length}`);
          console.log(`   Errors            : ${totalErrors}`);
          console.log(`   Warnings          : ${totalWarnings}`);
          if (aggregateScore!==null) console.log(`   Lighthouse Score  : ${aggregateScore}/100 (${si.label})`);
          SCRIPT

          node generate-report.js

      # ── UPLOAD CONSOLIDATED ARTIFACT ─────────────────────────────────────
      - name: Upload A11y Report
        uses: actions/upload-artifact@v4
        with:
          name: a11y-compliance-report
          path: a11y-report/report.htmlj
